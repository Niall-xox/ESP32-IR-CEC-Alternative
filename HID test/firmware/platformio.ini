[env:lolin_s3_mini]
platform = espressif32
board = lolin_s3_mini
framework = arduino

lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library

build_flags =
    ; ARDUINO_USB_MODE=0 enables TinyUSB, which is required for custom HID devices.
    ; This replaces the CDC Serial mode used in Phase 1 firmware.
    -D ARDUINO_USB_MODE=0
