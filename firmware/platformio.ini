[env:lolin_s3_mini]
platform = espressif32
board = lolin_s3_mini
framework = arduino

lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    crankyoldgit/IRremoteESP8266
    bblanchon/ArduinoJson

build_flags =
    ; ARDUINO_USB_MODE=0 enables TinyUSB, required for custom HID devices.
    ; Phase 1 used MODE=1 (CDC Serial) — Phase 2 uses MODE=0 (HID).
    -D ARDUINO_USB_MODE=0

; Use LittleFS for the filesystem partition.
; 'pio run -t uploadfs' uploads the data/ directory to this partition.
; The firmware itself creates profiles.json and settings.json on first boot.
board_build.filesystem = littlefs
