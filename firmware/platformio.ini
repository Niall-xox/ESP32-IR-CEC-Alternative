[env:lolin_s3_mini]
platform = espressif32
board = lolin_s3_mini
framework = arduino

lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    crankyoldgit/IRremoteESP8266

build_flags =
    ; Route Serial output over USB CDC rather than the hardware UART.
    ; Required on S3 when the board is connected via its native USB port.
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
